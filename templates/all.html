<h2>Все задачи</h2>

{% if tasks %}

    {% for task in tasks %}
        <hr>

        <p>время создания: {{ task["время создания"] }}</p>
        <p>имя: {{ task["имя"] }}</p>
        <p>выполнена: {{ task["сделана"] }}</p>
        <p>задание: {{ task["info"]["task"] }}</p>

    {% endfor %}

{% else %}
    <p>Задач нет</p>
{% endif %}
